naftiko: 1.0.0-alpha2
info:
  label: Kushki Card Payments API — Tokens
  description: 'Kushki Card Payments — Tokens. 1 operation. Lead operation: Kushki Tokenize Card. Self-contained Naftiko capability covering the card tokenization surface.'
  tags:
    - Kushki
    - Card Payments
    - Tokens
  created: '2026-05-24'
  modified: '2026-05-24'
binds:
  - namespace: env
    keys:
      KUSHKI_PUBLIC_MERCHANT_ID: KUSHKI_PUBLIC_MERCHANT_ID
capability:
  consumes:
    - type: http
      namespace: card-payments-tokens
      baseUri: https://api.kushkipagos.com
      description: Kushki Card Payments — Tokens business capability. Tokenization uses the public merchant id.
      resources:
        - name: card-v1-tokens
          path: /card/v1/tokens
          operations:
            - name: createcardtoken
              method: POST
              description: Kushki Tokenize Card
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  description: Tokenization request body (card details, totalAmount, currency).
                  required: true
      authentication:
        type: apikey
        key: Public-Merchant-Id
        value: '{{env.KUSHKI_PUBLIC_MERCHANT_ID}}'
        placement: header
  exposes:
    - type: rest
      namespace: card-payments-tokens-rest
      port: 8080
      description: REST adapter for Kushki Card Payments — Tokens.
      resources:
        - path: /v1/card/tokens
          name: card-v1-tokens
          description: REST surface for card tokenization.
          operations:
            - method: POST
              name: createcardtoken
              description: Kushki Tokenize Card
              call: card-payments-tokens.createcardtoken
              with:
                body: rest.body
              outputParameters:
                - type: object
                  mapping: $.
    - type: mcp
      namespace: card-payments-tokens-mcp
      port: 9090
      transport: http
      description: MCP adapter for Kushki Card Payments — Tokens.
      tools:
        - name: kushki-tokenize-card
          description: Kushki Tokenize Card
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: card-payments-tokens.createcardtoken
          with:
            body: tools.body
          outputParameters:
            - type: object
              mapping: $.
