naftiko: 1.0.0-alpha2
info:
  label: Kushki Subscriptions API — Subscriptions
  description: 'Kushki Subscriptions — Subscriptions. 5 operations. Lead operation: Kushki Create Subscription. Self-contained Naftiko capability covering recurring card subscriptions.'
  tags:
    - Kushki
    - Subscriptions
    - Recurring Payments
  created: '2026-05-24'
  modified: '2026-05-24'
binds:
  - namespace: env
    keys:
      KUSHKI_PRIVATE_MERCHANT_ID: KUSHKI_PRIVATE_MERCHANT_ID
capability:
  consumes:
    - type: http
      namespace: subscriptions-subscriptions
      baseUri: https://api.kushkipagos.com
      description: Scheduled and one-click recurring card subscriptions.
      resources:
        - name: subscriptions-v1-card
          path: /subscriptions/v1/card
          operations:
            - name: createsubscription
              method: POST
              description: Kushki Create Subscription
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  required: true
        - name: subscriptions-v1-card-id
          path: /subscriptions/v1/card/{subscriptionId}
          operations:
            - name: getsubscription
              method: GET
              description: Kushki Retrieve Subscription
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
            - name: updatesubscription
              method: PUT
              description: Kushki Update Subscription
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                - name: body
                  in: body
                  type: object
                  required: true
            - name: cancelsubscription
              method: DELETE
              description: Kushki Cancel Subscription
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
        - name: subscriptions-v1-card-id-charge
          path: /subscriptions/v1/card/{subscriptionId}/charge
          operations:
            - name: chargesubscription
              method: POST
              description: Kushki Charge Subscription On Demand
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                - name: body
                  in: body
                  type: object
                  required: false
      authentication:
        type: apikey
        key: Private-Merchant-Id
        value: '{{env.KUSHKI_PRIVATE_MERCHANT_ID}}'
        placement: header
  exposes:
    - type: rest
      namespace: subscriptions-subscriptions-rest
      port: 8080
      resources:
        - path: /v1/subscriptions
          name: subscriptions-v1-card
          operations:
            - method: POST
              name: createsubscription
              description: Kushki Create Subscription
              call: subscriptions-subscriptions.createsubscription
              with:
                body: rest.body
              outputParameters:
                - type: object
                  mapping: $.
        - path: /v1/subscriptions/{subscription-id}
          name: subscriptions-v1-card-id
          operations:
            - method: GET
              name: getsubscription
              description: Kushki Retrieve Subscription
              call: subscriptions-subscriptions.getsubscription
              with:
                subscriptionId: rest.path.subscription-id
              outputParameters:
                - type: object
                  mapping: $.
            - method: PUT
              name: updatesubscription
              description: Kushki Update Subscription
              call: subscriptions-subscriptions.updatesubscription
              with:
                subscriptionId: rest.path.subscription-id
                body: rest.body
              outputParameters:
                - type: object
                  mapping: $.
            - method: DELETE
              name: cancelsubscription
              description: Kushki Cancel Subscription
              call: subscriptions-subscriptions.cancelsubscription
              with:
                subscriptionId: rest.path.subscription-id
              outputParameters:
                - type: object
                  mapping: $.
        - path: /v1/subscriptions/{subscription-id}/charge
          name: subscriptions-v1-card-id-charge
          operations:
            - method: POST
              name: chargesubscription
              description: Kushki Charge Subscription On Demand
              call: subscriptions-subscriptions.chargesubscription
              with:
                subscriptionId: rest.path.subscription-id
                body: rest.body
              outputParameters:
                - type: object
                  mapping: $.
    - type: mcp
      namespace: subscriptions-subscriptions-mcp
      port: 9090
      transport: http
      tools:
        - name: kushki-create-subscription
          description: Kushki Create Subscription
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: subscriptions-subscriptions.createsubscription
          with:
            body: tools.body
          outputParameters:
            - type: object
              mapping: $.
        - name: kushki-retrieve-subscription
          description: Kushki Retrieve Subscription
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: subscriptions-subscriptions.getsubscription
          with:
            subscriptionId: tools.subscriptionId
          outputParameters:
            - type: object
              mapping: $.
        - name: kushki-update-subscription
          description: Kushki Update Subscription
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: subscriptions-subscriptions.updatesubscription
          with:
            subscriptionId: tools.subscriptionId
            body: tools.body
          outputParameters:
            - type: object
              mapping: $.
        - name: kushki-cancel-subscription
          description: Kushki Cancel Subscription
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: subscriptions-subscriptions.cancelsubscription
          with:
            subscriptionId: tools.subscriptionId
          outputParameters:
            - type: object
              mapping: $.
        - name: kushki-charge-subscription
          description: Kushki Charge Subscription On Demand
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: subscriptions-subscriptions.chargesubscription
          with:
            subscriptionId: tools.subscriptionId
            body: tools.body
          outputParameters:
            - type: object
              mapping: $.
