specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Kushki
providerId: kushki
created: '2026-05-24'
modified: '2026-05-24'
reconciled: false
tags:
  - FinOps
  - Cost Management
  - FOCUS
  - Payments
  - Acquiring
description: FOCUS-aligned FinOps definition for the Kushki LatAm payments platform. Costs are dominated by
  per-transaction MDR plus chargeback, refund, and FX fees; usage is denominated in transactions and currency
  rather than tokens or compute units.
sources:
  - https://kushkipagos.com/
  - https://docs.kushki.com/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Kushki
serviceCategory: Payments and Financial Services
billingModel:
  pricingCategory: Usage-Based
  billingFrequency: Monthly
  billingCurrency: Per-country (USD, COP, PEN, CLP, MXN, BRL)
  chargeCategories:
    - Usage
    - Fee
    - Adjustment
    - Credit
  primaryUnit: transaction
  secondaryUnits:
    - voucher
    - payout
    - chargeback
focusColumns:
  ServiceName: Kushki Payments
  ServiceCategory: Payments and Financial Services
  ProviderName: Kushki
  PublisherName: Kushki
  InvoiceIssuerName: Kushki (per local operating entity, e.g. Kushki operadora S.A. in Chile)
  PricingCategory: Usage-Based
  PricingUnit: transaction
  BillingCurrency: Per-country
meters:
  - name: card_transactions
    unit: transaction
    aggregation: sum
    dimensions: [country, currency, brand, transactionType]
  - name: card_transaction_volume
    unit: currency
    aggregation: sum
    dimensions: [country, currency, brand]
  - name: subscription_charges
    unit: transaction
    aggregation: sum
    dimensions: [country, currency]
  - name: cash_vouchers_generated
    unit: voucher
    aggregation: sum
    dimensions: [country, network]
  - name: cash_vouchers_paid
    unit: voucher
    aggregation: sum
    dimensions: [country, network]
  - name: transfer_charges
    unit: transaction
    aggregation: sum
    dimensions: [country, rail]
  - name: payouts_initiated
    unit: payout
    aggregation: sum
    dimensions: [country, rail]
  - name: chargebacks
    unit: chargeback
    aggregation: sum
    dimensions: [country, brand, reasonCode]
  - name: refunds
    unit: transaction
    aggregation: sum
    dimensions: [country, brand]
discountModels:
  - name: Volume tiers
    discount: Custom MDR tiering negotiated per merchant volume.
  - name: Local rail steering
    discount: Lower fees on local-rail payments (PIX, SPEI, PSE) versus international card rails.
  - name: Subscription pricing
    discount: Discounted MDR on recurring charges with on-file tokens.
unitEconomics:
  - name: Effective cost per transaction
    metric: total_fees / total_transactions
    target: Track against country baseline.
  - name: Cost as percent of volume
    metric: total_fees / total_transaction_volume
    target: Stay within negotiated MDR ceiling.
  - name: Chargeback rate
    metric: chargebacks / card_transactions
    target: '<0.9% (Visa/Mastercard threshold)'
  - name: Refund rate
    metric: refunds / card_transactions
    target: Monitor; sustained >5% may trigger rolling reserve.
principles:
  - name: Visibility
    description: Use the Kushki Console exports and webhook stream to ingest per-transaction events into a
      data warehouse — chargeback codes, MDR splits, FX margin, and rail mix.
  - name: Allocation
    description: Tag charges with branchId and merchant metadata so marketplaces can chargeback fees to the
      underlying seller.
  - name: Optimization
    description: Steer high-ticket Colombian volume to PSE, Brazilian volume to PIX, and Mexican volume to
      SPEI to lower MDR; route subscriptions through one-click to avoid full tokenization cost.
  - name: Accountability
    description: Set chargeback-rate alerts per country and per brand below the network threshold to avoid
      monitoring programs.
